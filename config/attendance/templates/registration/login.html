<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Tracker Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            margin-top: 0;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid #d6dce8;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #111;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .errorlist,
        .errornote {
            color: #b00020;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>School Tracker Login</h1>
        <p>Use your assigned username and password.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <label for="id_username">Username</label>
            {{ form.username }}

            <label for="id_password">Password</label>
            {{ form.password }}

            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
